{% extends "base.html" %}
{% block title %}New Binder - Engagement Workspace{% endblock %}
{% block content %}
<div class="container py-4" style="max-width: 700px;">
    <h3 class="mb-4"><i class="bi bi-journal-plus"></i> Create Engagement Binder</h3>
    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Binder Name *</label>
                    <input type="text" name="name" class="form-control" required
                           placeholder="e.g., Acme Corp - 2025 Audit">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Client Name *</label>
                    <input type="text" name="client_name" class="form-control" required
                           placeholder="e.g., Acme Corporation">
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Engagement Type</label>
                        <select name="engagement_type" class="form-select">
                            <option value="audit">Audit</option>
                            <option value="tax">Tax</option>
                            <option value="review">Review</option>
                            <option value="compilation">Compilation</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Period End Date</label>
                        <input type="date" name="period_end_date" class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea name="description" class="form-control" rows="3"
                              placeholder="Optional description of the engagement..."></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-plus-lg"></i> Create Binder
                    </button>
                    <a href="{{ url_for('fileroom.index') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    <div class="mt-3 text-muted">
        <small><i class="bi bi-info-circle"></i> Default folders (Planning, Testing, Completion, Financial Statements) will be created automatically.</small>
    </div>
</div>
{% endblock %}
