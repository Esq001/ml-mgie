{% extends "base.html" %}
{% block title %}Login - Engagement Workspace{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow" style="width: 400px;">
        <div class="card-header bg-primary-dark text-white text-center">
            <h4 class="mb-0"><i class="bi bi-archive-fill"></i> Engagement Workspace</h4>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
        </div>
        <div class="card-footer text-center">
            <small>Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></small>
        </div>
    </div>
</div>
{% endblock %}
