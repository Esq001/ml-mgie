databases:
  - name: engagement-db
    plan: free
    databaseName: engagement
    ipAllowList: []

services:
  - type: web
    name: sharepoint-doc-repo
    runtime: python
    plan: free
    rootDir: sharepoint
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: engagement-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.11"
